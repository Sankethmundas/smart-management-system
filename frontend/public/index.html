<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Smart Management System</title>
    <meta name="description" content="A smart project and task management dashboard with Kanban board, analytics, and team collaboration.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app" id="app">
        <!-- ─── Sidebar ──────────────────────────────────── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">⚡</span>
                <h2>TaskFlow</h2>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <button class="nav-item active" data-view="dashboard" id="nav-dashboard">
                    <span class="nav-icon">📊</span> Dashboard
                </button>
                <button class="nav-item" data-view="kanban" id="nav-kanban">
                    <span class="nav-icon">📋</span> Kanban Board
                </button>
                <button class="nav-item" data-view="tasks" id="nav-tasks">
                    <span class="nav-icon">✅</span> All Tasks
                </button>
                <button class="nav-item" data-view="projects" id="nav-projects">
                    <span class="nav-icon">📁</span> Projects
                </button>
                <button class="nav-item" data-view="team" id="nav-team">
                    <span class="nav-icon">👥</span> Team
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info">
                    <div class="user-avatar">SK</div>
                    <div>
                        <div class="user-name">Sanketh Kumar</div>
                        <div class="user-role">Admin</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ─── Main Content ─────────────────────────────── -->
        <main class="main-content" id="main-content">
            <!-- Top Bar -->
            <header class="topbar" id="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle">☰</button>
                    <h2 class="page-title" id="page-title">Dashboard</h2>
                </div>
                <div class="topbar-right">
                    <div class="search-bar">
                        <input type="text" placeholder="Search tasks..." id="global-search">
                    </div>
                    <button class="btn btn-primary" id="add-task-btn">+ New Task</button>
                </div>
            </header>

            <!-- ─── Dashboard View ───────────────────── -->
            <section class="view active" id="view-dashboard">
                <div class="stats-grid" id="stats-grid">
                    <div class="stat-card" id="stat-total">
                        <div class="stat-icon">📋</div>
                        <div class="stat-value" id="stat-total-value">0</div>
                        <div class="stat-label">Total Tasks</div>
                    </div>
                    <div class="stat-card completed" id="stat-completed">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value" id="stat-completed-value">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card progress" id="stat-progress">
                        <div class="stat-icon">🔄</div>
                        <div class="stat-value" id="stat-progress-value">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                    <div class="stat-card rate" id="stat-rate">
                        <div class="stat-icon">📈</div>
                        <div class="stat-value" id="stat-rate-value">0%</div>
                        <div class="stat-label">Completion Rate</div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card" id="chart-status">
                        <h3>Task Status Distribution</h3>
                        <div class="chart-container">
                            <canvas id="status-chart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card" id="chart-priority">
                        <h3>Priority Breakdown</h3>
                        <div class="chart-container">
                            <canvas id="priority-chart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="recent-activity" id="recent-activity">
                    <h3>Recent Activity</h3>
                    <div class="activity-list" id="activity-list"></div>
                </div>
            </section>

            <!-- ─── Kanban View ──────────────────────── -->
            <section class="view" id="view-kanban">
                <div class="kanban-board" id="kanban-board">
                    <div class="kanban-column" data-status="todo" id="kanban-todo">
                        <div class="kanban-header">
                            <span class="kanban-dot todo"></span>
                            <h3>To Do</h3>
                            <span class="kanban-count" id="count-todo">0</span>
                        </div>
                        <div class="kanban-tasks" id="tasks-todo"></div>
                    </div>
                    <div class="kanban-column" data-status="in-progress" id="kanban-inprogress">
                        <div class="kanban-header">
                            <span class="kanban-dot in-progress"></span>
                            <h3>In Progress</h3>
                            <span class="kanban-count" id="count-inprogress">0</span>
                        </div>
                        <div class="kanban-tasks" id="tasks-inprogress"></div>
                    </div>
                    <div class="kanban-column" data-status="done" id="kanban-done">
                        <div class="kanban-header">
                            <span class="kanban-dot done"></span>
                            <h3>Done</h3>
                            <span class="kanban-count" id="count-done">0</span>
                        </div>
                        <div class="kanban-tasks" id="tasks-done"></div>
                    </div>
                </div>
            </section>

            <!-- ─── Tasks List View ──────────────────── -->
            <section class="view" id="view-tasks">
                <div class="tasks-toolbar" id="tasks-toolbar">
                    <select id="filter-status">
                        <option value="">All Statuses</option>
                        <option value="todo">To Do</option>
                        <option value="in-progress">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                    <select id="filter-priority">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="tasks-table" id="tasks-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Assigned To</th>
                                <th>Due Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-tbody"></tbody>
                    </table>
                </div>
            </section>

            <!-- ─── Projects View ────────────────────── -->
            <section class="view" id="view-projects">
                <div class="projects-grid" id="projects-grid"></div>
            </section>

            <!-- ─── Team View ────────────────────────── -->
            <section class="view" id="view-team">
                <div class="team-grid" id="team-grid"></div>
            </section>
        </main>
    </div>

    <!-- ─── Add Task Modal ───────────────────────────── -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="task-modal">
            <div class="modal-header">
                <h3 id="modal-title">Add New Task</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Title *</label>
                    <input type="text" id="task-title" required placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Describe the task"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="todo">To Do</option>
                            <option value="in-progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-assignee">Assigned To</label>
                    <input type="text" id="task-assignee" placeholder="Team member name">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modal-submit">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
